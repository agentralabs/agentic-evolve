<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 400" role="img" aria-label="AgenticEvolve benchmark chart">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#b8b6ae"/>
    </pattern>
  </defs>
  <rect width="1400" height="400" fill="#f2f1ea"/>
  <rect width="1400" height="400" fill="url(#grid)"/>
  <rect x="20" y="20" width="1360" height="360" fill="none" stroke="#111111" stroke-width="2"/>

  <line x1="20" y1="62" x2="1380" y2="62" stroke="#111111" stroke-width="2"/>
  <text x="40" y="48" font-family="'JetBrains Mono', monospace" font-size="14" fill="#5f5c53" letter-spacing="2"> // AGENTRA_LABS: BENCHMARKS</text>
  <rect x="1318" y="36" width="8" height="8" fill="#ea580c"/>
  <text x="1336" y="48" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" letter-spacing="2">004</text>

  <text x="700" y="96" font-family="'JetBrains Mono', monospace" font-size="16" fill="#111111" font-weight="700" text-anchor="middle" letter-spacing="2">AgenticEvolve  ·  Criterion 0.5  ·  Apple M4 Pro  ·  Rust 1.90.0 --release</text>

  <!-- Pattern store: 12 us -->
  <text x="320" y="138" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Pattern store</text>
  <rect x="340" y="124" width="12" height="20" fill="#ea580c"/>
  <text x="360" y="138" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  12 us</text>

  <!-- Signature match: 45 us -->
  <text x="320" y="172" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Signature match</text>
  <rect x="340" y="158" width="45" height="20" fill="#111111"/>
  <text x="393" y="172" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  45 us</text>

  <!-- Context match: 120 us -->
  <text x="320" y="206" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Context match</text>
  <rect x="340" y="192" width="120" height="20" fill="#111111"/>
  <text x="468" y="206" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  120 us</text>

  <!-- Crystallize: 180 us -->
  <text x="320" y="240" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Crystallize</text>
  <rect x="340" y="226" width="180" height="20" fill="#ea580c"/>
  <text x="528" y="240" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  180 us</text>

  <!-- Compose (3 patterns): 85 us -->
  <text x="320" y="274" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Compose (3 patterns)</text>
  <rect x="340" y="260" width="85" height="20" fill="#111111"/>
  <text x="433" y="274" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  85 us</text>

  <!-- Optimize full: 2.1 ms -->
  <text x="320" y="308" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Optimize (full library)</text>
  <rect x="340" y="294" width="820" height="20" fill="#111111"/>
  <text x="1168" y="308" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  2.1 ms</text>

  <!-- Coverage scan: 340 us -->
  <text x="320" y="342" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Coverage scan</text>
  <rect x="340" y="328" width="340" height="20" fill="#ea580c"/>
  <text x="688" y="342" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  340 us</text>

  <!-- Tests badge -->
  <text x="320" y="370" font-family="'JetBrains Mono', monospace" font-size="11" fill="#5f5c53" text-anchor="end">321 tests passing</text>
  <rect x="340" y="358" width="100" height="16" fill="#111111"/>
  <text x="348" y="370" font-family="'JetBrains Mono', monospace" font-size="10" fill="#f2f1ea">ALL GREEN</text>
</svg>
