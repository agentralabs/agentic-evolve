<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 480" role="img" aria-label="AgenticEvolve architecture diagram">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#b8b6ae"/>
    </pattern>
  </defs>
  <rect width="1400" height="480" fill="#f2f1ea"/>
  <rect width="1400" height="480" fill="url(#grid)"/>
  <rect x="20" y="20" width="1360" height="440" fill="none" stroke="#111111" stroke-width="2"/>

  <line x1="20" y1="62" x2="1380" y2="62" stroke="#111111" stroke-width="2"/>
  <text x="40" y="48" font-family="'JetBrains Mono', monospace" font-size="14" fill="#5f5c53" letter-spacing="2"> // AGENTRA_LABS: ARCHITECTURE</text>
  <rect x="1318" y="36" width="8" height="8" fill="#ea580c"/>
  <text x="1336" y="48" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" letter-spacing="2">003</text>

  <!-- AI Agent Layer -->
  <rect x="350" y="82" width="700" height="46" fill="none" stroke="#111111" stroke-width="2"/>
  <rect x="350" y="82" width="700" height="46" fill="#111111" opacity="0.06"/>
  <text x="700" y="110" font-family="'JetBrains Mono', monospace" font-size="13" fill="#111111" font-weight="700" text-anchor="middle" letter-spacing="1">AI AGENT (Claude · Cursor · Windsurf · Cody · any LLM)</text>

  <!-- Arrow down -->
  <line x1="700" y1="128" x2="700" y2="156" stroke="#111111" stroke-width="2"/>
  <polygon points="694,152 706,152 700,162" fill="#111111"/>

  <!-- MCP STDIO Layer -->
  <rect x="440" y="162" width="520" height="40" fill="none" stroke="#ea580c" stroke-width="2"/>
  <text x="700" y="187" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ea580c" font-weight="700" text-anchor="middle" letter-spacing="2">MCP LAYER — 14 TOOLS + stdio/HTTP/SSE</text>

  <!-- Arrow down -->
  <line x1="700" y1="202" x2="700" y2="228" stroke="#111111" stroke-width="2"/>
  <polygon points="694,224 706,224 700,234" fill="#111111"/>

  <!-- Evolve Engine box -->
  <rect x="46" y="234" width="1308" height="180" fill="none" stroke="#111111" stroke-width="2"/>
  <text x="700" y="258" font-family="'JetBrains Mono', monospace" font-size="14" fill="#111111" font-weight="700" text-anchor="middle" letter-spacing="3">EVOLVE ENGINE</text>

  <!-- Module boxes -->
  <rect x="66" y="272" width="240" height="48" fill="none" stroke="#ea580c" stroke-width="2"/>
  <text x="186" y="292" font-family="'JetBrains Mono', monospace" font-size="10" fill="#ea580c" text-anchor="middle">Pattern</text>
  <text x="186" y="308" font-family="'JetBrains Mono', monospace" font-size="10" fill="#ea580c" text-anchor="middle">Matching (4 engines)</text>

  <rect x="320" y="272" width="210" height="48" fill="none" stroke="#111111" stroke-width="1"/>
  <text x="425" y="292" font-family="'JetBrains Mono', monospace" font-size="10" fill="#111111" text-anchor="middle">Crystallization</text>
  <text x="425" y="308" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5f5c53" text-anchor="middle">Engine</text>

  <rect x="544" y="272" width="210" height="48" fill="none" stroke="#111111" stroke-width="1"/>
  <text x="649" y="292" font-family="'JetBrains Mono', monospace" font-size="10" fill="#111111" text-anchor="middle">Composition</text>
  <text x="649" y="308" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5f5c53" text-anchor="middle">+ Gap Fill</text>

  <rect x="768" y="272" width="210" height="48" fill="none" stroke="#111111" stroke-width="1"/>
  <text x="873" y="292" font-family="'JetBrains Mono', monospace" font-size="10" fill="#111111" text-anchor="middle">Collective</text>
  <text x="873" y="308" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5f5c53" text-anchor="middle">Learning</text>

  <rect x="992" y="272" width="342" height="48" fill="none" stroke="#111111" stroke-width="1"/>
  <text x="1163" y="292" font-family="'JetBrains Mono', monospace" font-size="10" fill="#111111" text-anchor="middle">Optimization</text>
  <text x="1163" y="308" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5f5c53" text-anchor="middle">+ Cache Manager</text>

  <!-- Crates row -->
  <rect x="66" y="336" width="290" height="36" fill="none" stroke="#111111" stroke-width="1"/>
  <text x="211" y="358" font-family="'JetBrains Mono', monospace" font-size="11" fill="#5f5c53" text-anchor="middle">agentic-evolve-core</text>

  <rect x="370" y="336" width="290" height="36" fill="none" stroke="#111111" stroke-width="1"/>
  <text x="515" y="358" font-family="'JetBrains Mono', monospace" font-size="11" fill="#5f5c53" text-anchor="middle">agentic-evolve-mcp</text>

  <rect x="674" y="336" width="290" height="36" fill="none" stroke="#111111" stroke-width="1"/>
  <text x="819" y="358" font-family="'JetBrains Mono', monospace" font-size="11" fill="#5f5c53" text-anchor="middle">agentic-evolve-cli</text>

  <rect x="978" y="336" width="356" height="36" fill="none" stroke="#ea580c" stroke-width="1"/>
  <text x="1156" y="358" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ea580c" text-anchor="middle">agentic-evolve-ffi</text>

  <!-- Arrow down -->
  <line x1="700" y1="414" x2="700" y2="440" stroke="#111111" stroke-width="2"/>
  <polygon points="694,436 706,436 700,446" fill="#111111"/>

  <!-- .aevolve file -->
  <rect x="476" y="446" width="448" height="34" fill="none" stroke="#ea580c" stroke-width="2"/>
  <text x="700" y="468" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ea580c" font-weight="700" text-anchor="middle" letter-spacing="1">.aevolve  —  pattern state  —  portable  —  BLAKE3 integrity</text>
</svg>
